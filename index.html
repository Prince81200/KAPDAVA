<!DOCTYPE html>
<html>
<head>
<title>KAPDAVA</title>

<style>
body { margin:0; font-family: Arial; background:#f5f5f5; }

header {
  background:black;
  color:white;
  padding:15px;
  text-align:center;
  font-size:24px;
}

.products {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:15px;
  padding:10px;
}

.card {
  background:white;
  width:170px;
  padding:10px;
  border-radius:10px;
  text-align:center;
}

.card img { width:100%; border-radius:10px; }

select { margin-top:5px; padding:5px; }

button {
  background:green;
  color:white;
  padding:8px;
  border:none;
  margin-top:5px;
  cursor:pointer;
}

.cart {
  position:fixed;
  bottom:0;
  width:100%;
  background:black;
  text-align:center;
  padding:10px;
}

.cart button { background:orange; }
</style>

<script>
let cart = [];

function addToCart(name, price, qty) {
  cart.push(name + " x" + qty + " = ₹" + (price*qty));
  alert(name + " added (" + qty + ")");
}

function orderNow() {
  let msg = "Order:%0A";
  cart.forEach(i => msg += i + "%0A");
  window.open("https://wa.me/918305853662?text=" + msg);
}

function generateProducts() {
  let container = document.getElementById("products");

  let categories = [
    {name:"Shirt", price:499},
    {name:"T-Shirt", price:199},
    {name:"Pant", price:799},
    {name:"Cargo", price:699}
  ];

  categories.forEach(cat => {
    for(let i=1;i<=50;i++) {

      let div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <img src="https://source.unsplash.com/200x200/?${cat.name}">
        <p>${cat.name} ${i} ₹${cat.price}</p>
        <select>
          <option>1</option><option>5</option><option>10</option><option>50</option><option>100</option>
        </select>
        <button onclick="addToCart('${cat.name} ${i}',${cat.price}, this.previousElementSibling.value)">Add</button>
      `;

      container.appendChild(div);
    }
  });
}

window.onload = generateProducts;
</script>

</head>

<body>

<header>🔥 KAPDAVA</header>

<div id="products" class="products"></div>

<div class="cart">
<button onclick="orderNow()">🛒 Order on WhatsApp</button>
</div>

</body>
</html>
