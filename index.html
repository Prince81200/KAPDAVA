<!DOCTYPE html>
<html>
<head>
<title>KAPDAVA</title>

<style>
body { font-family: Arial; margin:0; background:#f5f5f5; }

header { background:white; padding:10px; display:flex; justify-content:space-between; }

.products { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; padding:10px; }

.card { background:white; padding:10px; border-radius:10px; }

button { background:#ff3f6c; color:white; border:none; padding:8px; width:100%; margin-top:5px; }
</style>

<script>
let products = [
  {name:"Shirt ₹499"},
  {name:"T-Shirt ₹199"},
  {name:"Jeans ₹999"},
  {name:"Cargo ₹699"}
];

function addToCart(item) {
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  cart.push(item);
  localStorage.setItem("cart", JSON.stringify(cart));
  alert("Added to cart");
}

function search() {
  let input = document.getElementById("search").value.toLowerCase();
  let items = document.getElementsByClassName("card");

  for(let i=0;i<items.length;i++){
    let text = items[i].innerText.toLowerCase();
    items[i].style.display = text.includes(input) ? "block":"none";
  }
}
</script>

</head>

<body>

<header>
<h3>KAPDAVA</h3>
<a href="cart.html">🛒 Cart</a>
</header>

<input id="search" onkeyup="search()" placeholder="Search..." style="width:95%; padding:10px;">

<div class="products">

<div class="card">
<p>Shirt ₹499</p>
<button onclick="addToCart('Shirt ₹499')">Add</button>
</div>

<div class="card">
<p>T-Shirt ₹199</p>
<button onclick="addToCart('T-Shirt ₹199')">Add</button>
</div>

<div class="card">
<p>Jeans ₹999</p>
<button onclick="addToCart('Jeans ₹999')">Add</button>
</div>

<div class="card">
<p>Cargo ₹699</p>
<button onclick="addToCart('Cargo ₹699')">Add</button>
</div>

</div>

</body>
</html>
