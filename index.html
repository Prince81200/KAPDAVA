
   
<!DOCTYPE html>
<html>
<head>
<title>KAPDAVA</title>

<style>
body { margin:0; font-family: Arial; background:#f5f5f5; }

header {
  background:black;
  color:white;
  padding:15px;
  text-align:center;
  font-size:24px;
}

.search { text-align:center; margin:10px; }

input {
  padding:10px;
  width:60%;
}

.products {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:15px;
  padding:10px;
}

.card {
  background:white;
  width:160px;
  padding:10px;
  border-radius:10px;
  text-align:center;
}

.card img { width:100%; border-radius:10px; }

button {
  background:green;
  color:white;
  padding:8px;
  border:none;
  margin-top:5px;
  cursor:pointer;
}

.cart {
  position:fixed;
  bottom:0;
  width:100%;
  background:black;
  text-align:center;
  padding:10px;
}

.cart button {
  background:orange;
}
</style>

<script>
let cart = [];

let products = [
  {name:"Shirt ₹499"},
  {name:"T-Shirt ₹199"},
  {name:"T-Shirt Lower ₹150"},
  {name:"Jeans ₹999"}
];

function addToCart(item) {
  cart.push(item);
  alert(item + " added");
}

function orderNow() {
  let msg = "Order:%0A";
  cart.forEach(i => msg += i + "%0A");
  window.open("https://wa.me/918305853662?text=" + msg);
}

function searchProduct() {
  let input = document.getElementById("search").value.toLowerCase();
  let cards = document.getElementsByClassName("card");

  for (let i = 0; i < cards.length; i++) {
    let text = cards[i].innerText.toLowerCase();
    cards[i].style.display = text.includes(input) ? "block" : "none";
  }
}
</script>

</head>

<body>

<header>🔥 KAPDAVA</header>

<div class="search">
  <input id="search" onkeyup="searchProduct()" placeholder="Search (t shirt, lower...)">
</div>

<div class="products">

<div class="card">
<img src="https://images.unsplash.com/photo-1520975922284-6c3a3f3d3f3f">
<p>Shirt ₹499</p>
<button onclick="addToCart('Shirt ₹499')">Add</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1516826957135-700dedea698c">
<p>T-Shirt ₹199</p>
<button onclick="addToCart('T-Shirt ₹199')">Add</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1593030761757-71fae45fa0e7">
<p>T-Shirt Lower ₹150</p>
<button onclick="addToCart('T-Shirt Lower ₹150')">Add</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1541099649105-f69ad21f3246">
<p>Jeans ₹999</p>
<button onclick="addToCart('Jeans ₹999')">Add</button>
</div>

</div>

<div class="cart">
<button onclick="orderNow()">🛒 Order on WhatsApp</button>
</div>

</body>
</html>
